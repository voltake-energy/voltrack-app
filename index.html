            'Completed':   'bg-emerald-100 text-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-300',
        };
        return `<span class="text-xs px-2.5 py-1 rounded-full font-medium uppercase tracking-wide ${map[status] || 'bg-slate-100 text-slate-800'}">${status}</span>`;
    };

    // ==========================================
    // FORM LOGIC
    // ==========================================
    const openForm = (phase, id) => {
        currentEditingId = id;
        const p = id ? projects.find(x => x.id === id) : { id: generateId(), date_request: getToday(), status_quotation: 'Pending' };
        document.getElementById('modal-title').innerText = id ? `Kemaskini: ${id}` : `Daftar Projek Baru`;

        const createGroup = (label, fid, type, val, opts = {}) => {
            const attrs = [];
            if (opts.readonly) attrs.push('readonly');
            if (opts.required) attrs.push('required');
            const base = "w-full text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white px-3 py-2.5 focus:ring-2 focus:ring-eng-blue focus:border-transparent outline-none transition-shadow";
            let inp = '';
            if (type === 'select') {
                inp = `<select id="${fid}" class="${base}" ${attrs.join(' ')}>
                    <option value="">-- Pilih --</option>
                    ${opts.options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('')}
                </select>`;
            } else if (type === 'textarea') {
                inp = `<textarea id="${fid}" rows="3" class="${base}" ${attrs.join(' ')}>${val || ''}</textarea>`;
            } else {
                inp = `<input type="${type}" id="${fid}" value="${val || ''}" class="${base}" ${attrs.join(' ')}>`;
            }
            return `<div class="mb-4">
                <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1.5 uppercase tracking-wide">${label}</label>
                ${inp}
                ${opts.hint ? `<p class="mt-1 text-[10px] text-slate-500">${opts.hint}</p>` : ''}
            </div>`;
        };

        let formHTML = '';
        if (phase === 'commercial') {
            formHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-x-4">
                ${createGroup('Project ID (Auto)', 'f_id', 'text', p.id, { readonly: true })}
                ${createGroup('Syarikat / Klien', 'f_company', 'text', p.company)}
                ${createGroup('Tarikh Request', 'f_date_request', 'date', p.date_request)}
                ${createGroup('Quotation No', 'f_quotation_no', 'text', p.quotation_no)}
                ${createGroup('Quotation Amount (RM)', 'f_quotation_amount', 'number', p.quotation_amount)}
                ${createGroup('Status Quotation', 'f_status_quotation', 'select', p.status_quotation, { options: ['Pending', 'Cancel', 'Approved'] })}
                ${createGroup('Tarikh Proceed (Jika Approved)', 'f_date_proceed', 'date', p.date_proceed, { hint: '⚡ Jika Approved, notifikasi Operation akan dijana secara automatik.' })}
            </div>`;
        } else if (phase === 'operation') {
            formHTML = `
                <div class="p-3 bg-slate-50 dark:bg-slate-900/50 rounded-lg mb-4 border border-slate-200 dark:border-slate-700">
                    <p class="text-xs text-slate-500">Projek: <span class="font-bold text-eng-blue">${p.id}</span> | ${p.company} | Proceed: <span class="font-bold">${p.date_proceed}</span></p>
                </div>
                <h3 class="font-bold text-xs text-slate-500 uppercase tracking-wider mb-3 pb-1 border-b border-slate-200 dark:border-slate-700">Dokumen Pra-Kerja</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-x-4">
                    ${createGroup('MOS', 'f_mos_ready', 'select', p.mos_ready, { options: ['Sedia', 'Belum', 'N/A'] })}
                    ${createGroup('JSA', 'f_jsa_ready', 'select', p.jsa_ready, { options: ['Sedia', 'Belum', 'N/A'] })}
                    ${createGroup('PTW', 'f_ptw_ready', 'select', p.ptw_ready, { options: ['Sedia', 'Belum', 'N/A'], hint: '⚠ Wajib Sedia sebelum mula kerja.' })}
                </div>
                <h3 class="font-bold text-xs text-slate-500 uppercase tracking-wider mb-3 mt-1 pb-1 border-b border-slate-200 dark:border-slate-700">Pelaksanaan Kerja</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-4">
                    ${createGroup('Tarikh Mula Kerja', 'f_date_start_job', 'date', p.date_start_job)}
                    ${createGroup('Tarikh Siap Kerja', 'f_date_completed_job', 'date', p.date_completed_job)}
                    ${createGroup('GWR Submitted?', 'f_gwr_submitted', 'select', p.gwr_submitted, { options: ['Yes', 'No'], hint: '⚡ Jika Yes, notifikasi Claim dijana.' })}
                    ${createGroup('GWR Date', 'f_gwr_date', 'date', p.gwr_date)}
                    ${createGroup('Full Report Submitted?', 'f_full_report_submitted', 'select', p.full_report_submitted, { options: ['Yes', 'No'], hint: '⚡ Jika Yes, projek masuk ke fasa Claim.' })}
                    ${createGroup('Full Report Date', 'f_full_report_date', 'date', p.full_report_date)}
                </div>`;
        } else if (phase === 'claim') {
            formHTML = `
                <div class="p-3 bg-slate-50 dark:bg-slate-900/50 rounded-lg mb-4 border border-slate-200 dark:border-slate-700">
                    <p class="text-xs text-slate-500">Projek: <span class="font-bold text-eng-blue">${p.id}</span> | ${p.company} | Full Report: <span class="font-bold">${p.full_report_date}</span></p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-4">
                    ${createGroup('Invoice No', 'f_invoice_no', 'text', p.invoice_no)}
                    ${createGroup('Invoice Date', 'f_invoice_date', 'date', p.invoice_date, { hint: '⚡ Tukar tarikh ini untuk auto-kira Follow Up & Due Date.' })}
                    ${createGroup('Presentation Date (Optional)', 'f_presentation_date', 'date', p.presentation_date)}
                    ${createGroup('Payment Status', 'f_payment_status', 'select', p.payment_status || 'Pending', { options: ['Pending', 'Paid', 'Outstanding'], hint: '⚡ Jika Outstanding, notifikasi LOD Tracker dijana.' })}
                </div>
                <h3 class="font-bold text-xs text-slate-500 uppercase tracking-wider mb-3 mt-1 pb-1 border-b border-slate-200 dark:border-slate-700">Jadual Penjejakan Automatik</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-x-2">
                    ${createGroup('Follow Up 1 (+7 Hari)', 'f_followup_1', 'date', p.followup_1, { readonly: true })}
                    ${createGroup('Follow Up 2 (+14 Hari)', 'f_followup_2', 'date', p.followup_2, { readonly: true })}
                    ${createGroup('Follow Up 3 (+21 Hari)', 'f_followup_3', 'date', p.followup_3, { readonly: true })}
                    ${createGroup('Payment Due (+30 Hari)', 'f_payment_due_date', 'date', p.payment_due_date, { readonly: true })}
                </div>`;
        } else if (phase === 'lod') {
            formHTML = `
                <div class="p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg mb-4 flex justify-between items-center">
                    <p class="text-xs text-red-800 dark:text-red-300">${p.id} — ${p.company}</p>
                    <span class="text-xs font-bold bg-red-600 text-white px-3 py-1 rounded-full">Overdue: ${p.overdue_days || '-'} Hari</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-4">
                    ${createGroup('LOD Reminder (Due+7) [Auto]', 'f_lod_reminder_sent', 'date', p.lod_reminder_sent, { readonly: true })}
                    ${createGroup('Tarikh Sebenar Reminder Hantar', 'f_lod_reminder_date', 'date', p.lod_reminder_date)}
                    ${createGroup('LOD Issue (Due+14) [Auto]', 'f_lod_issue', 'date', p.lod_issue, { readonly: true })}
                    ${createGroup('Tarikh Sebenar LOD Dikeluarkan', 'f_lod_issue_date', 'date', p.lod_issue_date)}
                    ${createGroup('CTOS Action', 'f_ctos_action', 'select', p.ctos_action, { options: ['Pending', 'Initiated', 'Completed'] })}
                    ${createGroup('Legal Action', 'f_legal_action', 'select', p.legal_action, { options: ['Pending', 'Initiated', 'Completed'] })}
                    ${createGroup('Case Status', 'f_case_status', 'select', p.case_status, { options: ['Open', 'KIV', 'Closed'] })}
                </div>
                ${createGroup('Remarks / Nota Kes', 'f_remark', 'textarea', p.remark)}`;
        }

        document.getElementById('modal-body').innerHTML = formHTML;
        document.getElementById('modal-backdrop').classList.remove('hidden');
        document.getElementById('modal-backdrop').classList.add('flex');
        attachFormListeners(phase);
    };

    const attachFormListeners = (phase) => {
        if (phase === 'commercial') {
            const statusEl = document.getElementById('f_status_quotation');
            const proceedEl = document.getElementById('f_date_proceed');
            statusEl.addEventListener('change', e => {
                if (e.target.value === 'Approved') proceedEl.value = getToday();
                else proceedEl.value = '';
            });
        }
        if (phase === 'operation') {
            const gwrSel = document.getElementById('f_gwr_submitted');
            const gwrDate = document.getElementById('f_gwr_date');
            const repSel = document.getElementById('f_full_report_submitted');
            const repDate = document.getElementById('f_full_report_date');
            gwrSel.addEventListener('change', e => { gwrDate.value = e.target.value === 'Yes' ? getToday() : ''; });
            repSel.addEventListener('change', e => { repDate.value = e.target.value === 'Yes' ? getToday() : ''; });
        }
        if (phase === 'claim') {
            const invDate = document.getElementById('f_invoice_date');
            invDate.addEventListener('change', e => {
                const d = e.target.value;
                document.getElementById('f_followup_1').value = addDays(d, 7);
                document.getElementById('f_followup_2').value = addDays(d, 14);
                document.getElementById('f_followup_3').value = addDays(d, 21);
                document.getElementById('f_payment_due_date').value = addDays(d, 30);
            });
        }
    };

    const saveForm = () => {
        const id = currentEditingId || document.getElementById('f_id')?.value;
        if (!id) return;
        let projIndex = projects.findIndex(p => p.id === id);
        let p = projIndex >= 0 ? { ...projects[projIndex] } : { id };

        const beforeStatus = { ...p };

        document.getElementById('modal-body').querySelectorAll('input, select, textarea').forEach(input => {
            const key = input.id.replace('f_', '');
            p[key] = input.value;
        });

        if (projIndex >= 0) projects[projIndex] = p;
        else projects.push(p);

        closeModal();

        if (beforeStatus.status_quotation !== 'Approved' && p.status_quotation === 'Approved') {
            showToast(`✅ ${p.id} diluluskan! Notifikasi Operation dijana.`, 'success');
        }
        if (beforeStatus.gwr_submitted !== 'Yes' && p.gwr_submitted === 'Yes') {
            showToast(`📋 GWR ${p.id} dihantar. Sediakan Full Report.`, 'info');
        }
        if (beforeStatus.full_report_submitted !== 'Yes' && p.full_report_submitted === 'Yes') {
            showToast(`✅ Full Report ${p.id} selesai! Buka Claim untuk jana invoice.`, 'success');
        }
        if (p.payment_status === 'Outstanding' && beforeStatus.payment_status !== 'Outstanding') {
            showToast(`⚠ ${p.id} kini TERTUNGGAK! LOD Tracker dikemas kini.`, 'urgent');
        }
        if (p.payment_status === 'Paid' && beforeStatus.payment_status !== 'Paid') {
            showToast(`💰 ${p.id} telah dibayar! Terima kasih.`, 'success');
        }

        switchView(currentView);
    };

    const closeModal = () => {
        document.getElementById('modal-backdrop').classList.add('hidden');
        document.getElementById('modal-backdrop').classList.remove('flex');
        currentEditingId = null;
    };

    // ==========================================
    // THEME
    // ==========================================
    const toggleTheme = () => {
        document.documentElement.classList.toggle('dark');
        try { localStorage.setItem('volttrack_theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); } catch (e) {}
        if (chartInstances.qChart) initCharts();
    };

    // ==========================================
    // VIEW MODE TOGGLE (Desktop View / Mobile View / Auto)
    // ==========================================
    const setViewMode = (mode) => {
        viewMode = mode;
        document.documentElement.classList.remove('force-desktop', 'force-mobile');
        if (mode === 'desktop') document.documentElement.classList.add('force-desktop');
        if (mode === 'mobile') document.documentElement.classList.add('force-mobile');
        try { localStorage.setItem('volttrack_view_mode', mode); } catch (e) {}
        updateViewModeUI();
        showToast(
            mode === 'auto' ? '🖥️ Paparan kembali ke Auto (ikut saiz skrin).' :
            mode === 'desktop' ? '🖥️ Paparan dipaksa ke mod Desktop.' :
            '📱 Paparan dipaksa ke mod Mobile.',
            'info'
        );
        // Re-render current view supaya layout grid terpakai serta-merta
        setTimeout(() => switchView(currentView), 50);
    };

    // Kitar pantas: Auto -> Desktop -> Mobile -> Auto (untuk butang ringkas di sidebar)
    const toggleViewMode = () => {
        const order = ['auto', 'desktop', 'mobile'];
        const next = order[(order.indexOf(viewMode) + 1) % order.length];
        setViewMode(next);
    };

    const updateViewModeUI = () => {
        const labelMap = { auto: 'Paparan: Auto', desktop: 'Paparan: Desktop', mobile: 'Paparan: Mobile' };
        const iconMap = { auto: 'fa-display', desktop: 'fa-desktop', mobile: 'fa-mobile-screen' };
        document.querySelectorAll('.view-mode-label').forEach(el => { el.textContent = labelMap[viewMode]; });
        document.querySelectorAll('.view-mode-icon').forEach(el => { el.className = `fa-solid ${iconMap[viewMode]} w-4 text-center view-mode-icon`; });
        document.querySelectorAll('.view-mode-option').forEach(btn => {
            const check = btn.querySelector('.view-mode-check');
            if (btn.dataset.mode === viewMode) check.classList.remove('hidden');
            else check.classList.add('hidden');
        });
    };

    // Close dropdown panels bila klik luar
    document.addEventListener('click', (e) => {
        const notifPanel = document.getElementById('notif-panel');
        const notifBtn = document.getElementById('notif-btn');
        const settingsPanel = document.getElementById('settings-panel');
        const settingsBtn = document.getElementById('settings-btn');

        if (notifPanelOpen && !notifPanel.contains(e.target) && !notifBtn.contains(e.target)) {
            toggleNotifPanel();
        }
        if (settingsPanelOpen && !settingsPanel.contains(e.target) && !settingsBtn.contains(e.target)) {
            toggleSettingsPanel();
        }
    });

    // ==========================================
    // PWA: SERVICE WORKER REGISTRATION
    // ==========================================
    // NOTA: service worker hanya boleh didaftar bila app dibuka dari https://
    // atau localhost. Bukaan terus dari fail (file://) akan gagal senyap -
    // ini normal, app tetap berfungsi penuh sebagai laman web biasa.
    let swRegistration = null;
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then((reg) => { swRegistration = reg; })
                .catch((err) => { console.log('Service worker tidak berdaftar (normal jika dibuka dari fail terus):', err.message); });
        });
    }

    // ==========================================
    // PWA: INSTALL PROMPT (Android / Desktop Chrome/Edge)
    // ==========================================
    let deferredInstallPrompt = null;

    const showInstallButtons = () => {
        ['install-btn', 'install-btn-desktop', 'install-btn-settings'].forEach(id => {
            const el = document.getElementById(id);
            if (el) { el.classList.remove('hidden'); el.classList.add('flex'); }
        });
        const dot = document.getElementById('settings-attention-dot');
        if (dot) dot.classList.remove('hidden');
    };
    const hideInstallButtons = () => {
        ['install-btn', 'install-btn-desktop', 'install-btn-settings'].forEach(id => {
            const el = document.getElementById(id);
            if (el) { el.classList.add('hidden'); el.classList.remove('flex'); }
        });
    };

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredInstallPrompt = e;
        showInstallButtons();
    });

    const triggerInstall = async () => {
        if (!deferredInstallPrompt) {
            showToast('App sudah dipasang atau pelayar tidak menyokong install automatik.', 'info');
            return;
        }
        deferredInstallPrompt.prompt();
        const choice = await deferredInstallPrompt.userChoice;
        if (choice.outcome === 'accepted') {
            showToast('✅ VoltTrack berjaya dipasang di peranti anda!', 'success');
        }
        deferredInstallPrompt = null;
        hideInstallButtons();
    };

    window.addEventListener('appinstalled', () => {
        hideInstallButtons();
        document.getElementById('ios-install-banner').classList.add('hidden');
    });

    // --- iOS Safari: tiada beforeinstallprompt, papar arahan manual ---
    const isIos = () => /iphone|ipad|ipod/i.test(navigator.userAgent) ||
                        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const isInStandaloneMode = () => ('standalone' in window.navigator) && window.navigator.standalone;

    const dismissIosBanner = () => {
        document.getElementById('ios-install-banner').classList.add('hidden');
        try { localStorage.setItem('volttrack_ios_banner_dismissed', '1'); } catch (e) {}
    };

    const maybeShowIosBanner = () => {
        if (isIos() && !isInStandaloneMode()) {
            let dismissed = false;
            try { dismissed = localStorage.getItem('volttrack_ios_banner_dismissed') === '1'; } catch (e) {}
            if (!dismissed) {
                setTimeout(() => document.getElementById('ios-install-banner').classList.remove('hidden'), 1500);
            }
        }
    };

    // ==========================================
    // NOTIFICATION PERMISSION + LOCAL NOTIFICATION DISPATCH
    // ==========================================
    // Ini bahagian yang jawab soalan "kat mana button aktifkan notifikasi di mobile".
    // Butang ada di 3 tempat serentak: sidebar desktop, dan dalam panel "⋮ Tetapan"
    // (panel ⋮ ini SENTIASA nampak di header — termasuk di skrin mobile yang kecil).
    const updateNotifPermissionUI = () => {
        const btnDesktop = document.getElementById('notif-permission-btn-desktop');
        const btnSettings = document.getElementById('notif-permission-btn-settings');
        const alreadyOn = document.getElementById('notif-already-on-settings');

        if (!('Notification' in window)) {
            [btnDesktop, btnSettings].forEach(b => b && b.classList.add('hidden'));
            return;
        }

        if (Notification.permission === 'granted') {
            [btnDesktop, btnSettings].forEach(b => { if (b) { b.classList.add('hidden'); b.classList.remove('flex'); } });
            if (alreadyOn) { alreadyOn.classList.remove('hidden'); alreadyOn.classList.add('flex'); }
        } else if (Notification.permission === 'denied') {
            [btnDesktop, btnSettings].forEach(b => b && b.classList.add('hidden'));
            if (alreadyOn) alreadyOn.classList.add('hidden');
        } else {
            [btnDesktop, btnSettings].forEach(b => { if (b) { b.classList.remove('hidden'); b.classList.add('flex'); } });
            if (alreadyOn) alreadyOn.classList.add('hidden');
            const dot = document.getElementById('settings-attention-dot');
            if (dot) dot.classList.remove('hidden');
        }
    };

    const requestNotifPermission = async () => {
        if (!('Notification' in window)) {
            showToast('Pelayar ini tidak menyokong notifikasi.', 'info');
            return;
        }
        const result = await Notification.requestPermission();
        updateNotifPermissionUI();
        if (result === 'granted') {
            showToast('🔔 Notifikasi diaktifkan! Anda akan dimaklumkan bila app dibuka.', 'success');
            dispatchLocalNotification('VoltTrack', 'Notifikasi telah diaktifkan untuk peranti ini.', 'success');
        } else if (result === 'denied') {
            showToast('Notifikasi ditolak. Anda boleh ubah semula di tetapan pelayar.', 'warning');
        }
    };

    // Hantar local notification (melalui Service Worker jika ada, atau terus jika tidak)
    // PENTING: ini local notification, bukan push jarak jauh. Ia hanya berfungsi
    // bila tab/app ini dibuka aktif atau baru sahaja di background (bukan ditutup total).
    // Bunyi dimainkan serentak (Web Audio tone) selain bunyi sistem OS notification.
    const dispatchLocalNotification = (title, body, urgency = 'info', tag = null) => {
        if (!('Notification' in window) || Notification.permission !== 'granted') return;

        playNotifSound(urgency);

        if (swRegistration && swRegistration.active) {
            swRegistration.active.postMessage({
                type: 'SHOW_NOTIFICATION',
                payload: { title, body, urgency, tag: tag || `vt-${Date.now()}` }
            });
        } else if (swRegistration) {
            swRegistration.showNotification(title, {
                body, icon: './icons/icon-192.png', badge: './icons/icon-192.png',
                tag: tag || `vt-${Date.now()}`,
                vibrate: urgency === 'urgent' ? [200, 100, 200] : [100],
            });
        } else {
            new Notification(title, { body, icon: './icons/icon-192.png' });
        }
    };

    // Track notif yang sudah pernah dihantar sebagai OS notification (elak spam berulang)
    let dispatchedNotifKeys = new Set();
    const dispatchNewUrgentNotifications = () => {
        if (!('Notification' in window) || Notification.permission !== 'granted') return;
        const toDispatch = notifications.filter(n => {
            const key = `${n.type}-${n.projectId}`;
            const isUrgentOrWarning = NOTIF_TYPES[n.type]?.priority === 'urgent' || NOTIF_TYPES[n.type]?.priority === 'warning';
            return !n.read && isUrgentOrWarning && !dispatchedNotifKeys.has(key);
        });
        toDispatch.forEach(n => {
            const key = `${n.type}-${n.projectId}`;
            dispatchedNotifKeys.add(key);
            dispatchLocalNotification('VoltTrack — ' + (n.projectId || ''), n.message, NOTIF_TYPES[n.type]?.priority, key);
        });
    };

    // ==========================================
    // RESTORE SAVED PREFERENCES (theme, sound, view mode)
    // ==========================================
    const restorePreferences = () => {
        try {
            const savedTheme = localStorage.getItem('volttrack_theme');
            if (savedTheme === 'dark') document.documentElement.classList.add('dark');

            const savedSound = localStorage.getItem('volttrack_sound_enabled');
            if (savedSound !== null) soundEnabled = savedSound === '1';
            updateSoundToggleUI();

            const savedViewMode = localStorage.getItem('volttrack_view_mode');
            if (savedViewMode && ['auto', 'desktop', 'mobile'].includes(savedViewMode)) {
                viewMode = savedViewMode;
                document.documentElement.classList.remove('force-desktop', 'force-mobile');
                if (viewMode === 'desktop') document.documentElement.classList.add('force-desktop');
                if (viewMode === 'mobile') document.documentElement.classList.add('force-mobile');
            }
            updateViewModeUI();
        } catch (e) { /* localStorage tidak tersedia - guna default */ }
    };

    // ==========================================
    // INIT
    // ==========================================
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-save').addEventListener('click', saveForm);
    document.getElementById('theme-toggle-desktop')?.addEventListener('click', toggleTheme);
    document.getElementById('theme-toggle-settings')?.addEventListener('click', toggleTheme);

    window.onload = () => {
        restorePreferences();
        autoUpdateLogic();
        initNav();
        switchView('dashboard');
        updateNotifPermissionUI();
        maybeShowIosBanner();

        const urgentFirst = notifications.find(n => NOTIF_TYPES[n.type]?.priority === 'urgent');
        if (urgentFirst) {
            setTimeout(() => showToast(urgentFirst.message, 'urgent'), 800);
        }
        setTimeout(() => dispatchNewUrgentNotifications(), 1200);
    };
    </script>
</body>
</html>
